server: 
  servlet:
    context-path: /api
  port: 8081
sa-token: 
  token-prefix: Bearer 
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位s 默认30天, -1代表永不过期 
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录) 
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token) 
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
esplat:
  file:
    storage-mode: minio
    minio: 
      service-url: http://127.0.0.1:9000/
      access-key: minio
      secret-key: minio123
      bucket: assets
      port: 9000
  config: 
    multi-tenancy: false
    cors:
      allow-credentials: true
      allowed-origin: http://localhost:16000,http://localhost:16001,http://localhost:7000
    ingore-auth:
    - /websocket/**
    - /swagger-ui/**
    - /api-docs/**
    - "**/code/image"
    - "**/code/sms"
    - "**/admin/file/preview"
    - "**/auth/**"
    - "/code/image"
    - "/code/sms"
    - "/admin/file/preview"
    - "/auth/**"
    - "/docs"
    - "/*.ico"
    - "/*.js"
    - "/*.css"
anyline: 
  primary-generator-snowflake-active: true
spring:
  session:
    store-type: redis
  redis:
    database: 12
    host: 127.0.0.1
    port: 6379
    password: root
    lettuce:
      pool:
        time-between-eviction-runs: 30
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 20
        # 连接池中的最大空闲连接
        max-idle: 2
        # 连接池中的最小空闲连接
        min-idle: 1
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
    # 连接超时时间（毫秒）默认是2000ms
    timeout: 20000
  datasource:
    druid:
      db-type: mysql
      filters: stat
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:4306/esflow-pro?useUnicode=true&amp
      username: root
      password: root@2016
      #配置初始化大小/最小/最大
      initial-size: 1
      min-idle: 1
      max-active: 20
      #获取连接等待超时时间
      max-wait: 60000
      #间隔多久进行一次检测，检测需要关闭的空闲连接
      time-between-eviction-runs-millis: 60000
      #一个连接在池中最小生存的时间
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 'x' 
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      #打开PSCache，并指定每个连接上PSCache的大小。oracle设为true，mysql设为false。分库分表较多推荐设置为false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: 20 